[global]
name = "test_worker"
log_dir = "/tmp/hustsync_test/log/{{.Name}}"
mirror_dir = "/tmp/hustsync_test/mirrors"
concurrent = 10

[manager]
api_base = "http://127.0.0.1:12345"
token = "secret"
ca_cert = ""

[server]
hostname = "127.0.0.1"
listen_addr = "127.0.0.1"
listen_port = 6000

[[mirrors]]
name = "elvish"
provider = "rsync"
upstream = "rsync://rsync.elv.sh/elvish/"
interval = 1440
retry = 2
timeout = 600
