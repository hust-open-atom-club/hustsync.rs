[global]
name = ""
log_dir = "/var/log/hustsync/{{.Name}}"
mirror_dir = "/srv/mirror"
concurrent = 10
interval = 120

[manager]
api_base = "http://localhost:12345"
token = ""
ca_cert = ""

[cgroup]
enable = false
base_path = "/sys/fs/cgroup"
group = "hustsync"

[server]
hostname = "localhost"
listen_addr = "127.0.0.1"
listen_port = 6000
ssl_cert = ""
ssl_key = ""

[[mirrors]]
name = ""
provider = "rsync"
upstream = ""
use_ipv6 = false